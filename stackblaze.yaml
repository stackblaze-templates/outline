databases:
  - name: outline-db
    databaseName: outline
    user: outline
services:
  - type: web
    name: outline
    runtime: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: outline-db
          property: connectionString
      - key: REDIS_URL
        value: redis://redis:6379
      - key: SECRET_KEY
        generateValue: true
      - key: UTILS_SECRET
        generateValue: true
      - key: URL
        value: https://outline.example.com
