databases:
  - name: outline-db
    type: postgres
    databaseName: outline
    user: outline
caches:
  - name: outline-redis
    type: redis
services:
  - type: web
    name: outline
    runtime: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: outline-db
          property: connectionString
      - key: REDIS_URL
        fromCache:
          name: outline-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: UTILS_SECRET
        generateValue: true
      - key: URL
        value: https://outline.example.com
